<!DOCTYPE html>
<html>

<head>
</head>

<body>

    <h1>Create Employee</h1>
    <p>Fill this form to create a new employee record.</p>
    <hr />
    <form>
        <label for="username">Username:*</label>
        <input id="username" type="text" placeholder="Enter username" autofocus required />
        <br />
        <label for="name">Name:*</label>
        <input id="name" type="text" placeholder="Enter name" required />
        <br />
        <label for="password">Password:*</label>
        <input id="password" type="password" placeholder="Enter password" required />
        <br />
        <label for="email">Email:*</label>
        <input id="email" type="email" placeholder="Enter email" required />
        <br />
        <label for="phone">Phone:*</label>
        <input id="phone" type="tel" placeholder="Enter phone" required />
        <br />
        <label for="hiredate">Hire date:*</label>
        <input id="hiredate" type="date" placeholder="Enter hire date" required />
        <br />
        <input type="submit" value="Create" />
    </form>

</body>

</html>
