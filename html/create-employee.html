<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Employee Record</title>
    <!--
    -->
    <style>
        .my-style {
            color: blue;
        }

        #my-style {
            color: yellow;
        }

        body {
            font-family: Arial, sans-serif;
            font-size: 15px;
            background-color: #f0f2f5;
            color: #222;
            margin: 0;
            padding: 40px 20px;
        }

        h1 {
            text-align: center;
            font-size: 26px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 30px;
            letter-spacing: 0.5px;
        }

        form {
            max-width: 700px;
            margin: 0 auto;
            background-color: #ffffff;
            padding: 36px 40px;
            border-radius: 10px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }

        fieldset {
            border: 1.5px solid #c8d0dc;
            border-radius: 8px;
            padding: 20px 24px;
            margin-bottom: 24px;
            background-color: #fafbfc;
        }

        legend {
            font-size: 14px;
            font-weight: 700;
            color: #ffffff;
            background-color: #2c5f8a;
            padding: 4px 14px;
            border-radius: 20px;
            letter-spacing: 0.4px;
        }

        label {
            display: inline-block;
            font-size: 13px;
            font-weight: 600;
            color: #444;
            margin-bottom: 4px;
            margin-top: 10px;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="number"],
        input[type="date"],
        input[type="time"],
        input[type="month"],
        input[type="week"],
        input[type="url"],
        input[type="search"] {
            display: block;
            width: 100%;
            box-sizing: border-box;
            padding: 9px 12px;
            font-size: 14px;
            border: 1.5px solid #c8d0dc;
            border-radius: 6px;
            background-color: #ffffff;
            color: #222;
            outline: none;
            margin-bottom: 4px;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="tel"]:focus,
        input[type="number"]:focus,
        input[type="date"]:focus,
        input[type="time"]:focus,
        input[type="month"]:focus,
        input[type="week"]:focus,
        input[type="url"]:focus,
        input[type="search"]:focus {
            border-color: #2c5f8a;
            box-shadow: 0 0 0 3px rgba(44, 95, 138, 0.15);
        }

        select {
            display: block;
            width: 100%;
            box-sizing: border-box;
            padding: 9px 12px;
            font-size: 14px;
            border: 1.5px solid #c8d0dc;
            border-radius: 6px;
            background-color: #ffffff;
            color: #222;
            outline: none;
            margin-bottom: 4px;
            cursor: pointer;
        }

        select:focus {
            border-color: #2c5f8a;
            box-shadow: 0 0 0 3px rgba(44, 95, 138, 0.15);
        }

        textarea {
            display: block;
            width: 100%;
            box-sizing: border-box;
            padding: 9px 12px;
            font-size: 14px;
            font-family: Arial, sans-serif;
            border: 1.5px solid #c8d0dc;
            border-radius: 6px;
            background-color: #ffffff;
            color: #222;
            outline: none;
            resize: vertical;
            margin-bottom: 4px;
        }

        textarea:focus {
            border-color: #2c5f8a;
            box-shadow: 0 0 0 3px rgba(44, 95, 138, 0.15);
        }

        input[type="range"] {
            display: block;
            width: 100%;
            margin: 8px 0 4px;
            accent-color: #2c5f8a;
            cursor: pointer;
        }

        input[type="color"] {
            display: block;
            width: 60px;
            height: 36px;
            border: 1.5px solid #c8d0dc;
            border-radius: 6px;
            padding: 2px;
            cursor: pointer;
            background-color: #fff;
        }

        input[type="file"] {
            display: block;
            font-size: 13px;
            color: #555;
            margin-bottom: 4px;
            cursor: pointer;
        }

        input[type="radio"],
        input[type="checkbox"] {
            accent-color: #2c5f8a;
            width: 15px;
            height: 15px;
            cursor: pointer;
            vertical-align: middle;
            margin-right: 4px;
        }

        output {
            font-weight: 700;
            color: #2c5f8a;
        }

        input[type="submit"] {
            background-color: #2c5f8a;
            color: #ffffff;
            border: none;
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        input[type="submit"]:hover {
            background-color: #1e4468;
        }

        input[type="reset"] {
            background-color: #e8edf2;
            color: #333;
            border: 1.5px solid #c8d0dc;
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            margin-left: 10px;
            transition: background-color 0.2s;
        }

        input[type="reset"]:hover {
            background-color: #d5dce5;
        }

        button {
            background-color: #ffffff;
            color: #2c5f8a;
            border: 1.5px solid #2c5f8a;
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            margin-left: 10px;
            transition: background-color 0.2s, color 0.2s;
        }

        button:hover {
            background-color: #2c5f8a;
            color: #ffffff;
        }

        br {
            display: block;
            margin: 2px 0;
        }
    </style>

</head>

<body>

    <h1>New Employee Record</h1>

    <form action="/employees" method="post" enctype="multipart/form-data">

        <fieldset>
            <legend>Personal Information</legend>

            <label for="first_name">First Name:</label><br>
            <input type="text" id="first_name" name="first_name" placeholder="e.g. Shridhar" autocomplete="given-name"
                required><br><br>

            <label for="last_name">Last Name:</label><br>
            <input type="text" id="last_name" name="last_name" placeholder="e.g. Kumar" autocomplete="family-name"
                required><br><br>

            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" placeholder="employee@company.com" autocomplete="email"
                required><br><br>

            <label for="phone">Phone:</label><br>
            <input type="tel" id="phone" name="phone" placeholder="+91 98765 43210" autocomplete="tel"><br><br>

            <label for="dob">Date of Birth:</label><br>
            <input type="date" id="dob" name="dob"><br><br>

            <label>Gender:</label><br>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label>
            <input type="radio" id="other" name="gender" value="other">
            <label for="other">Other</label>
            <input type="radio" id="prefer_not" name="gender" value="prefer_not">
            <label for="prefer_not">Prefer not to say</label><br><br>

            <label for="profile_photo">Profile Photo:</label><br>
            <input type="file" id="profile_photo" name="profile_photo" accept="image/*"><br><br>

        </fieldset>

        <br>

        <fieldset>
            <legend>Job Details</legend>

            <label for="employee_id">Employee ID:</label><br>
            <input type="number" id="employee_id" name="employee_id" placeholder="e.g. 10042" min="1" step="1"><br><br>

            <label for="join_date">Joining Date:</label><br>
            <input type="date" id="join_date" name="join_date"><br><br>

            <label for="department">Department:</label><br>
            <select id="department" name="department">
                <option value="">-- Select Department --</option>
                <option value="engineering">Engineering</option>
                <option value="hr">Human Resources</option>
                <option value="finance">Finance</option>
                <option value="marketing">Marketing</option>
                <option value="operations">Operations</option>
                <option value="sales">Sales</option>
            </select><br><br>

            <label for="job_title">Job Title:</label><br>
            <input type="text" id="job_title" name="job_title" list="job_titles_list"
                placeholder="Search or type title">
            <datalist id="job_titles_list">
                <option value="Software Engineer">
                <option value="Senior Software Engineer">
                <option value="Tech Lead">
                <option value="Project Manager">
                <option value="Business Analyst">
                <option value="HR Manager">
                <option value="DevOps Engineer">
            </datalist><br><br>

            <label for="employment_type">Employment Type (select one):</label><br>
            <select id="employment_type" name="employment_type" size="4">
                <option value="fulltime">Full-time</option>
                <option value="parttime">Part-time</option>
                <option value="contract">Contract</option>
                <option value="intern">Intern</option>
            </select><br><br>

            <label for="work_shift">Work Shift Start Time:</label><br>
            <input type="time" id="work_shift" name="work_shift"><br><br>

            <label for="salary">Annual Salary (₹): <output id="salary_output">500000</output></label><br>
            <input type="range" id="salary" name="salary" min="300000" max="5000000" step="50000" value="500000"
                oninput="document.getElementById('salary_output').value = this.value"><br><br>

            <label>Skills:</label><br>
            <input type="checkbox" id="skill_java" name="skills" value="java">
            <label for="skill_java">Java</label>
            <input type="checkbox" id="skill_spring" name="skills" value="spring">
            <label for="skill_spring">Spring Boot</label>
            <input type="checkbox" id="skill_mongodb" name="skills" value="mongodb">
            <label for="skill_mongodb">MongoDB</label>
            <input type="checkbox" id="skill_react" name="skills" value="react">
            <label for="skill_react">React</label>
            <input type="checkbox" id="skill_python" name="skills" value="python">
            <label for="skill_python">Python</label>
            <input type="checkbox" id="skill_devops" name="skills" value="devops">
            <label for="skill_devops">DevOps</label><br><br>

        </fieldset>

        <br>

        <fieldset>
            <legend>Additional Information</legend>

            <label for="website">LinkedIn / Portfolio URL:</label><br>
            <input type="url" id="website" name="website" placeholder="https://linkedin.com/in/..."><br><br>

            <label for="probation_end">Probation End Month:</label><br>
            <input type="month" id="probation_end" name="probation_end"><br><br>

            <label for="review_week">Performance Review Week:</label><br>
            <input type="week" id="review_week" name="review_week"><br><br>

            <label for="badge_color">Badge Accent Color:</label><br>
            <input type="color" id="badge_color" name="badge_color" value="#0011fa"><br><br>

            <label for="search_manager">Search Reporting Manager:</label><br>
            <input type="search" id="search_manager" name="search_manager" placeholder="Search by name..."><br><br>

            <label for="resume">Resume / Documents (multiple allowed):</label><br>
            <input type="file" id="resume" name="resume" accept=".pdf,.doc,.docx" multiple><br><br>

            <input type="hidden" id="dept_id" name="dept_id" value="DEPT-0042">

            <label for="notes">Additional Notes:</label><br>
            <textarea id="notes" name="notes" rows="4" cols="50"
                placeholder="Any remarks about the employee..."></textarea><br><br>

        </fieldset>

        <br>
        <fieldset>
            <legend>Consent &amp; Confirmation</legend>

            <input type="checkbox" id="consent_data" name="consent_data" value="yes" required>
            <label for="consent_data">I confirm the information is accurate and consent to data
                processing.</label><br><br>

            <input type="checkbox" id="consent_policy" name="consent_policy" value="yes">
            <label for="consent_policy">The employee has acknowledged the company's code of conduct.</label><br><br>

        </fieldset>

        <br>

        <input type="submit" value="Create Employee">
        <input type="reset" value="Reset Form">
        <button type="button" onclick="alert('Draft saved!')">Save as Draft</button>

    </form>

</body>

</html>
